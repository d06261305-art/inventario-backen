<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD MongoDB Atlas</title>
</head>
<body>

  <h1>CRUD con MongoDB Atlas</h1>

  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre del producto" required>
    <input type="number" id="precio" placeholder="Precio" required>
    <button type="submit">Guardar</button>
  </form>

  <hr>

  <ul id="lista"></ul>

  <script>
    const formulario = document.getElementById("formulario");
    const lista = document.getElementById("lista");

    async function cargarProductos() {
      try {
        const respuesta = await fetch("/api/productos");
        const productos = await respuesta.json();

        lista.innerHTML = "";

        productos.forEach(producto => {
          const li = document.createElement("li");

          li.innerHTML = `
            <strong>${producto.nombre}</strong> - $${producto.precio}
            <button onclick="editarProducto('${producto._id}', '${producto.nombre}', ${producto.precio})">
              Editar
            </button>
            <button onclick="eliminarProducto('${producto._id}')">
              Eliminar
            </button>
          `;

          lista.appendChild(li);
        });

      } catch (error) {
        console.error(error);
      }
    }

    formulario.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value;
      const precio = Number(document.getElementById("precio").value);

      try {
        await fetch("/api/productos", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nombre,
            precio
          })
        });

        formulario.reset();
        cargarProductos();

      } catch (error) {
        console.error(error);
      }
    });

    async function editarProducto(id, nombreActual, precioActual) {

      const nombre = prompt("Nuevo nombre:", nombreActual);

      if (nombre === null) return;

      const precio = Number(
        prompt("Nuevo precio:", precioActual)
      );

      if (isNaN(precio)) return;

      try {
        await fetch(`/api/productos/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            nombre,
            precio
          })
        });

        cargarProductos();

      } catch (error) {
        console.error(error);
      }
    }

    async function eliminarProducto(id) {

      const confirmar = confirm(
        "¿Deseas eliminar este producto?"
      );

      if (!confirmar) return;

      try {
        await fetch(`/api/productos/${id}`, {
          method: "DELETE"
        });

        cargarProductos();

      } catch (error) {
        console.error(error);
      }
    }

    cargarProductos();
  </script>

</body>
</html>
